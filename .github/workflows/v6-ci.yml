name: V6 CI
on:
  push:
    branches: [v6-app]
    paths: ["v6/**", ".github/workflows/v6-ci.yml"]
  pull_request:
    paths: ["v6/**", ".github/workflows/v6-ci.yml"]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm run build
