name: Apply complete V6

on:
  push:
    branches:
      - v6-app
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: v6-app
          fetch-depth: 0

      - name: Rebuild verified V6 source tree
        shell: bash
        run: |
          set -euo pipefail
          cat .payload/part-*.bin > /tmp/quotidien-v6.tar.gz
          mkdir -p /tmp/quotidien-v6
          tar -xzf /tmp/quotidien-v6.tar.gz -C /tmp/quotidien-v6
          rsync -a --delete --exclude='.git' /tmp/quotidien-v6/ ./

      - name: Commit complete V6
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: replace V5 with complete Quotidien V6"
          git push origin HEAD:v6-app
