name: Apply complete V6

on:
  push:
    branches:
      - v6-app
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: v6-app
          fetch-depth: 0
          show-progress: false

      - name: Rebuild verified V6 source tree
        shell: bash
        run: |
          set -euo pipefail
          cat .payload/part-*.bin > /tmp/quotidien-v6.tar.gz
          mkdir -p /tmp/quotidien-v6
          tar -xzf /tmp/quotidien-v6.tar.gz -C /tmp/quotidien-v6
          rsync -a --delete --exclude='.git' --exclude='.github' /tmp/quotidien-v6/ ./

      - name: Commit complete V6
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "feat: replace V5 with complete Quotidien V6"
            git push origin HEAD:v6-app
          } > /tmp/migration.log 2>&1
          status=$?
          cat /tmp/migration.log
          if [ "$status" -ne 0 ]; then
            body=$(printf '### Échec automatique de la migration V6\n\n```text\n%s\n```' "$(cat /tmp/migration.log)")
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number || 1 }}/comments -f body="$body" || true
            exit "$status"
          fi
