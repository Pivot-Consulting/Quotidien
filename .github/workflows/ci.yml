name: Vérification

on:
  pull_request:
  push:
    branches: [main, v6-ultra]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer les dépendances
        run: npm ci --silent
      - name: Vérifier TypeScript
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          npx tsc --noEmit -p tsconfig.json --pretty false > tsc-errors.txt 2>&1
          status=$?
          cat tsc-errors.txt
          if [ "$status" -ne 0 ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo '### Erreurs TypeScript'
              echo '```text'
              head -c 50000 tsc-errors.txt
              echo
              echo '```'
            } > pr-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file pr-comment.md
          fi
          exit "$status"
      - name: Tester
        run: npm test
      - name: Compiler
        run: npm run build
