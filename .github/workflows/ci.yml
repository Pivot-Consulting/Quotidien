name: Vérification

on:
  pull_request:
  push:
    branches: [main, v6-ultra]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer les dépendances
        run: npm ci --silent
      - name: Vérifier TypeScript
        run: npx tsc --noEmit -p tsconfig.json --pretty false
      - name: Tester
        run: npm test
      - name: Compiler
        run: npm run build
