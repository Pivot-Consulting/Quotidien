name: Corriger runtime V6.1

on:
  push:
    branches: [v6-ultra]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v6-ultra
      - name: Appliquer les corrections runtime
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/app-v61.ts')
          text = app.read_text()
          text = text.replace("registerServiceWorker();\nsetInterval(checkReminders, 30_000);", "registerServiceWorker();\nsetTimeout(handleInitialUrl, 0);\nsetInterval(checkReminders, 30_000);")
          text = text.replace("<label class=\"checkbox\"><input name=\"compact\" type=\"checkbox\" ${state.preferences.compactMode?'checked':''}> Interface compacte</label><div class=\"setting-actions\">", "<label class=\"checkbox\"><input name=\"compact\" type=\"checkbox\" ${state.preferences.compactMode?'checked':''}> Interface compacte</label><label class=\"checkbox\"><input name=\"notifications\" type=\"checkbox\" ${state.preferences.notificationsEnabled?'checked':''}> Notifications locales</label><div class=\"setting-actions\">")
          old_submit = "await store.setPreference('compactMode',d.has('compact'));}); }"
          new_submit = "await store.setPreference('compactMode',d.has('compact'));let notifications=d.has('notifications');if(notifications&&'Notification' in window&&Notification.permission==='default')await Notification.requestPermission();notifications=notifications&&'Notification' in window&&Notification.permission==='granted';await store.setPreference('notificationsEnabled',notifications);}); }"
          if old_submit not in text:
              raise SystemExit('Soumission réglages introuvable')
          text = text.replace(old_submit, new_submit)
          text = text.replace("new Notification(event.title,{body:event.location||`Dans ${event.reminderMinutes} min`,tag:key});state.notificationLog[key]=new Date().toISOString();", "new Notification(event.title,{body:event.location||`Dans ${event.reminderMinutes} min`,tag:key});await store.markNotification(key);")
          marker = "function registerServiceWorker():void{if('serviceWorker'in navigator)window.addEventListener('load',()=>void navigator.serviceWorker.register('./sw.js'));}"
          replacement = "function handleInitialUrl():void{const params=new URLSearchParams(location.search);const date=params.get('date');if(date)selectedDate=date;const requested=params.get('screen');if(requested==='today'||requested==='plan'||requested==='notes'||requested==='tracking')screen=requested;const capture=params.get('capture');if(capture==='task')openTask();else if(capture==='event')openEvent();else if(capture==='note')openNote();else if(capture==='goal')openGoal();else if(capture==='block')openBlock();if(params.toString())history.replaceState({},'',location.pathname+location.hash);render();}\nfunction registerServiceWorker():void{if('serviceWorker'in navigator)window.addEventListener('load',()=>void navigator.serviceWorker.register('./sw.js').then(registration=>{if(registration.waiting)registration.waiting.postMessage({type:'SKIP_WAITING'});registration.addEventListener('updatefound',()=>{const worker=registration.installing;worker?.addEventListener('statechange',()=>{if(worker.state==='installed'&&navigator.serviceWorker.controller)showToast('Une mise à jour de Quotidien est prête.');});});}));}"
          if marker not in text:
              raise SystemExit('Fonction service worker introuvable')
          app.write_text(text.replace(marker, replacement))

          store = Path('src/store.ts')
          store_text = store.read_text()
          store_marker = "async setTop3(date: string, ids: Id[]): Promise<void> { this.state.preferences.top3[date] = ids.slice(0, 3); await this.commit(); }"
          store_replacement = store_marker + "\n  async markNotification(key: string): Promise<void> { this.state.notificationLog[key] = nowIso(); await this.commit(); }"
          if store_marker not in store_text:
              raise SystemExit('Insertion store introuvable')
          store.write_text(store_text.replace(store_marker, store_replacement))
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-v61.ts src/store.ts
          git commit -m "fix(v6.1): gérer raccourcis PWA et notifications"
          git push origin HEAD:v6-ultra
