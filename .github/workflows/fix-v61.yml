name: Corriger V6.1

on:
  push:
    branches: [v6-ultra]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v6-ultra
      - name: Corriger les erreurs de typage
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/app-v61.ts')
          text = path.read_text()
          text = text.replace("const root = document.querySelector<HTMLElement>('#app');\nif (!root) throw new Error('Conteneur #app introuvable');", "const appRoot = document.querySelector<HTMLElement>('#app');\nif (!appRoot) throw new Error('Conteneur #app introuvable');\nconst root: HTMLElement = appRoot;")
          text = text.replace("as Task['status']", "as NonNullable<Task['status']>")
          text = text.replace("as Task['energy']", "as NonNullable<Task['energy']>")
          text = text.replace("openNote({} as Note);", "openNote();")
          path.write_text(text)
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app-v61.ts
          git commit -m "fix(v6.1): corriger le typage et le journal"
          git push origin HEAD:v6-ultra
