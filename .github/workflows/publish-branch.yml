name: Publier la branche GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publication-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier et compiler
        run: npm run verify

      - name: Préparer le site statique
        run: |
          rm -rf /tmp/quotidien-pages
          mkdir -p /tmp/quotidien-pages
          cp -R dist/. /tmp/quotidien-pages/
          touch /tmp/quotidien-pages/.nojekyll
          cp /tmp/quotidien-pages/index.html /tmp/quotidien-pages/404.html
          echo "${GITHUB_SHA}" > /tmp/quotidien-pages/version.txt

      - name: Publier dans la branche gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -rf .
          cp -R /tmp/quotidien-pages/. .
          git add -A
          git commit -m "deploy: Quotidien ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
